<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoMo Payment</title>

    <style>

        body{
            font-family: Arial;
            padding: 40px;
        }

        button{
            padding: 12px 20px;
            font-size: 18px;
            cursor: pointer;
        }

        #status{
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <h1>Thanh toán MoMo</h1>

    <button id="payBtn">
        Thanh toán 10.000đ
    </button>

    <div id="status"></div>

    <script>

        const payBtn = document.getElementById("payBtn");

        const statusDiv = document.getElementById("status");


        // =========================
        // CREATE PAYMENT
        // =========================
        payBtn.addEventListener("click", async () => {

            statusDiv.innerText = "Đang tạo thanh toán...";

            try {

                const res = await fetch(
                    "http://localhost:5000/payment/create",
                    {
                        method: "POST"
                    }
                );

                const data = await res.json();

                console.log(data);

                if(data.resultCode !== 0){

                    statusDiv.innerText = "Tạo thanh toán thất bại";

                    return;
                }

                const orderId = data.orderId;

                localStorage.setItem("orderId", orderId);

                localStorage.setItem("payUrl", data.payUrl);

                // Mở MoMo payment page
                window.open(data.payUrl, "_blank");


                // Bắt đầu polling
                startPolling(orderId);

            }
            catch(err){

                console.log(err);

                statusDiv.innerText = "Lỗi kết nối backend";
            }

        });



        // =========================
        // POLLING
        // =========================
        function startPolling(orderId){

            statusDiv.innerText = "Đang chờ thanh toán...";

            const interval = setInterval(async () => {

                try{

                    const res = await fetch(
                        `http://localhost:5000/payment/status/${orderId}`
                    );

                    const data = await res.json();

                    console.log("STATUS =", data);

                    // Thanh toán thành công
                    if(data.resultCode === 0){

                        statusDiv.innerText =
                            "Thanh toán thành công";

                        clearInterval(interval);
                    }

                }
                catch(err){

                    console.log(err);
                }

            }, 3000);

        }

    </script>

</body>
</html>
