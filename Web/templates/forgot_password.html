<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCare - Forgot Password</title>
  <link rel="stylesheet" href="../static/css/forgot_password.css">
</head>
<body>
  <!-- Logo -->
  <div class="logo">
    <img src="../static/img/logo.png" alt="Logo">
    <span>SmartCare</span>
  </div>

  <!-- Forgot Password Form -->
  <div class="forgot-container">
    <h2>Forgot Password</h2>
    <p>Enter your email address and we will send you an OTP to reset your password</p>
    <form id="forgotForm">
      <input type="email" id="email" placeholder="Email" required>
      <button type="submit" class="forgot-btn">Send OTP</button>
    </form>
    <div class="links">
      <p>Already have an account? <a href="login.html">Log in</a></p>
      <p>Don’t have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script>
    document.getElementById("forgotForm").addEventListener("submit", function(e) {
      e.preventDefault(); // chặn form reload trang
      const email = document.getElementById("email").value.trim();

      if (email !== "") {
        // Chuyển hướng sang send_otp.html
        window.location.href = "send_otp.html";
      } else {
        alert("Please enter your email.");
      }
    });
  </script>
</body>
</html>
