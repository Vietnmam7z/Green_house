<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartCare - Verify OTP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../static/css/send_otp.css">
</head>
<body>
  <!-- Logo -->
  <div class="logo">
    <img src="../static/img/logo.png" alt="Logo">
    <span>SmartCare</span>
  </div>

  <!-- OTP Modal -->
  <div class="modal">
    <p>We have sent the OTP code, please check your email and fill it below.</p>

    <div class="otp-row">
      <input type="text" id="otpInput" placeholder="Enter OTP">
      <button id="resendBtn">03:00</button>
    </div>

    <button class="verify-btn">Verify</button>
  </div>

  <script src="../static/js/send_otp.js"></script>
</body>
</html>
