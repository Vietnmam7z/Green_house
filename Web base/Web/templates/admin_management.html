<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCare - Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/admin_management.css">
</head>
<body>

    <div class="navbar">
        <div class="navbar-left">
            <img src="/static/img/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">SmartCare</span>
        </div>

        <div class="navbar-right">
            <img src="/static/img/bell.png" alt="Notifications" class="nav-icon">
            
            <div class="user-profile-container">
                <div class="user-profile">
                    <img src="/static/img/user.png" alt="User" class="nav-icon">
                    <div class="user-info">
                        <span class="user-name" id="userName">ĐANG TẢI...</span>
                        <span class="user-role" id="userRole">administrator</span>
                    </div>
                </div>

                <div class="user-dropdown">
                    <div class="dropdown-greeting">
                        Xin chào,
                        <span class="greet-name" id="dropdown-userName">...</span>
                    </div>
                    
                    <a href="/profile?tab=account" class="dropdown-item" id="menu-account">
                        <i class="fa-regular fa-id-badge"></i> Thông tin tài khoản
                    </a>
                    
                    <a href="#" id="dropdown-logoutBtn" class="dropdown-item logout-btn">
                        <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="menu-cards">
            
            <div class="menu-card" id="btn-user-management">
                <img src="/static/img/user_management.png" alt="User Management">
                <span>USER<br>MANAGEMENT</span>
            </div>

            <div class="menu-card" id="btn-greenhouse-management">
                <img src="/static/img/greenhouse_management.png" alt="Greenhouse Management">
                <span>GREENHOUSE<br>MANAGEMENT</span>
            </div>

        </div>
    </div>

    <script src="/static/js/admin_management.js"></script>
</body>
</html>
