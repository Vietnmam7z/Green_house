<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCare Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">
            <img src="../static/img/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">SmartCare</span>
        </div>

        <div class="navbar-right">
            <img src="../static/img/bell.png" alt="Notifications" class="nav-icon" style="cursor: pointer;" title="Thông báo">
            
            <div class="user-profile-container">
                <div class="user-profile">
                    <img src="../static/img/user.png" alt="User" class="nav-icon">
                    <div class="user-info">
                        <span class="user-name" id="userName">ĐANG TẢI...</span>
                        <span class="user-role" id="userRole">role</span>
                    </div>
                </div>

                <div class="user-dropdown">
                    <div class="dropdown-greeting">
                        Xin chào,
                        <span class="greet-name" id="dropdown-userName">...</span>
                    </div>
                    
                    <a href="/profile?tab=account" class="dropdown-item" id="menu-account">
                        <i class="fa-regular fa-id-badge"></i> Thông tin tài khoản
                    </a>
                    <a href="/profile?tab=billing" class="dropdown-item" id="menu-billing">
                        <i class="fa-solid fa-receipt"></i> Hóa đơn chưa thanh toán
                    </a>
                    <a href="/profile?tab=history" class="dropdown-item" id="menu-history">
                        <i class="fa-solid fa-clock-rotate-left"></i> Lịch sử thanh toán
                    </a>
                    <a href="/profile?tab=service" class="dropdown-item" id="menu-service">
                        <i class="fa-solid fa-cubes"></i> Gói dịch vụ thuê
                    </a>
                    <a href="/notifications" class="dropdown-item" id="menu-notifications">
                        <i class="fa-regular fa-bell"></i> Quản lý thông báo
                    </a>
                    <a href="/manage" class="dropdown-item" id="menu-admin">
                        <i class="fa-solid fa-seedling"></i> Quản lý hệ thống
                    </a>
                    <a href="#" id="dropdown-logoutBtn" class="dropdown-item logout-btn">
                        <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        
        <div class="dashboard-title">DASHBOARD</div>

        <div class="action-bar">
            <button id= "goToDashboard" class = "btn-action btn-back">
                <i class="fa-solid fa-rotate-left"></i> Back
            </button>
            
            <div class="info-pill" style="display: flex; align-items: center; gap: 15px;">
                <span style="border-right: 2px solid #ccc; padding-right: 15px; margin-right: -5px;">
                    Field ID: <strong id="current-field-id" style="color: #2e7d32;">---</strong>
                </span>
                
                <button id="btn-prev-field" class="btn-nav"><i class="fa-solid fa-chevron-left"></i></button>
                <span>Field Name: <strong id="current-field-name">Đang tải...</strong></span>
                <button id="btn-next-field" class="btn-nav"><i class="fa-solid fa-chevron-right"></i></button>
            </div>

            <button id ="ControlBtn" class="btn-action btn-control">
                <i class="fa-solid fa-wifi"></i> Control
            </button>
        </div>

        <div id="dynamic-devices-container"></div>

    </div>

    <script src="../static/js/notifications.js"></script>
    <script src="../static/js/dashboard.js"></script>
    <style>
        .chart-time-btn { padding: 6px 16px; margin: 0 4px; cursor: pointer; border: 1px solid #ccc; border-radius: 20px; background: #f8f9fa; font-weight: bold; color: #555; transition: 0.3s; }
        .chart-time-btn:hover { background: #e2e6ea; }
        .chart-time-btn.active { background: #00bcd4; color: white; border-color: #00bcd4; }
    </style>
    <div id="chartModal" onclick="dongBieuDo()" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6);">
        <div onclick="event.stopPropagation()" style="background-color: #fff; margin: 5% auto; padding: 20px; border-radius: 10px; width: 80%; max-width: 800px; position: relative;">
            <span onclick="dongBieuDo()" style="position: absolute; right: 20px; top: 15px; font-size: 24px; font-weight: bold; cursor: pointer; color: #aaa;">&times;</span>
            <h3 id="chartTitle" style="text-align: center; color: #333; margin-top: 0;">Biểu đồ</h3>
            
            <div style="text-align: center; margin-bottom: 15px;">
                <button class="chart-time-btn" id="btn-time-1h" onclick="changeChartTime('1h')">1 Giờ</button>
                <button class="chart-time-btn active" id="btn-time-1d" onclick="changeChartTime('1d')">1 Ngày</button>
                <button class="chart-time-btn" id="btn-time-7d" onclick="changeChartTime('7d')">7 Ngày</button>
                <button class="chart-time-btn" id="btn-time-30d" onclick="changeChartTime('30d')">30 Ngày</button>
            </div>

            <canvas id="sensorChart" width="400" height="200"></canvas>
        </div>
    </div>
</body>
</html>
