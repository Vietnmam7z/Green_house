<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCare Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">
            <img src="../static/img/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">SmartCare</span>
        </div>

        <div class="navbar-right">
            <img src="../static/img/bell.png" alt="Notifications" class="nav-icon" style="cursor: pointer;" title="Thông báo">
            
            <div class="user-profile">
                <img src="../static/img/user.png" alt="User" class="nav-icon">
                <div class="user-info">
                    <span class="user-name" id="userName">ĐANG TẢI...</span>
                    <span class="user-role" id="userRole">role</span>
                </div>
            </div>

            <img src="../static/img/settings.png" alt="Settings" id="btn-settings" class="nav-icon" style="cursor: pointer;" title="Quản lý Hệ thống">

            <img src="../static/img/logout-icon.png" alt="Logout" id="logoutBtn" class="nav-icon" style="cursor: pointer;" title="Đăng xuất">
        </div>
    </div>

    <div class="main-container">
        
        <div class="dashboard-title">DASHBOARD</div>

        <div class="action-bar">
            <button id= "goToDashboard" class = "btn-action btn-back">
                <i class="fa-solid fa-rotate-left"></i> Back
            </button>
            
            <div class="info-pill" style="display: flex; align-items: center; gap: 15px;">
                <span style="border-right: 2px solid #ccc; padding-right: 15px; margin-right: -5px;">
                    Field ID: <strong id="current-field-id" style="color: #2e7d32;">---</strong>
                </span>
                
                <button id="btn-prev-field" class="btn-nav"><i class="fa-solid fa-chevron-left"></i></button>
                <span>Field Name: <strong id="current-field-name">Đang tải...</strong></span>
                <button id="btn-next-field" class="btn-nav"><i class="fa-solid fa-chevron-right"></i></button>
            </div>

            <button id ="ControlBtn" class="btn-action btn-control">
                <i class="fa-solid fa-wifi"></i> Control
            </button>
        </div>

        <div id="dynamic-devices-container"></div>

    </div>

    <script src="/static/js/dashboard.js"></script>
    <div id="chartModal" onclick="dongBieuDo()" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6);">
        <div onclick="event.stopPropagation()" style="background-color: #fff; margin: 5% auto; padding: 20px; border-radius: 10px; width: 80%; max-width: 800px; position: relative;">
            <!-- Nút X tắt biểu đồ -->
            <span onclick="dongBieuDo()" style="position: absolute; right: 20px; top: 15px; font-size: 24px; font-weight: bold; cursor: pointer; color: #aaa;">&times;</span>
            <h3 id="chartTitle" style="text-align: center; color: #333; margin-top: 0;">Biểu đồ</h3>
            <canvas id="sensorChart" width="400" height="200"></canvas>
        </div>
    </div>
</body>
</html>
