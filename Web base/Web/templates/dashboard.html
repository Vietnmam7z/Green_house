<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCare Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === RESET & CÀI ĐẶT CHUNG === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8; /* Nền xám nhạt */
            color: #333;
        }

        /* === THANH NAVBAR (ĐIỀU HƯỚNG TRÊN CÙNG) === */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 12px 24px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
        }

        .nav-logo i {
            color: #4caf50; /* Màu xanh lá của logo */
            font-size: 20px;
            margin-right: 8px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-logout {
            background-color: #0056b3; /* Nút xanh dương đậm */
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .nav-icons {
            display: flex;
            gap: 15px;
            color: #555;
            font-size: 18px;
        }

        .nav-icons i {
            cursor: pointer;
        }

        /* === KHUNG CHỨA NỘI DUNG CHÍNH === */
        .main-container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 20px 30px;
        }

        /* === TIÊU ĐỀ DASHBOARD === */
        .dashboard-title {
            text-align: center;
            color: #7cb342; /* Màu xanh lá mạ */
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        /* === THANH CÔNG CỤ (ACTION BAR) === */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn-action {
            padding: 10px 24px;
            border-radius: 25px;
            border: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back { background-color: #4fc3f7; } /* Xanh lơ nhạt */
        .btn-control { background-color: #2ecc71; } /* Xanh lá */

        .info-pill {
            background-color: #e0e0e0;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 13px;
            color: #333;
            display: flex;
            gap: 20px;
            font-weight: 500;
        }

        /* === KHU VỰC PANEL === */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            margin-top: 10px;
        }

        .panel-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 15px 20px;
            width: 220px; /* Độ rộng cố định giống ảnh */
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .icon-box {
            font-size: 24px;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        /* Màu icon */
        .color-temp { color: #ff5252; }
        .color-humid { color: #40a9ff; }
        .color-light { color: #ffca28; }
        .color-co2 { color: #66bb6a; }
        .color-pressure { color: #78909c; }
        .color-soil { color: #8d6e63; }

        .data-box {
            display: flex;
            flex-direction: column;
        }

        .data-label {
            font-size: 12px;
            color: #95a5a6;
            margin-bottom: 2px;
        }

        .data-value {
            font-size: 22px;
            font-weight: 700;
            color: #111;
        }

        .data-unit {
            font-size: 12px;
            font-weight: 600;
            color: #7f8c8d;
            margin-left: 2px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            <i class="fa-solid fa-leaf"></i> SmartCare
        </div>
        <div class="nav-actions">
            <button class="btn-logout">Log out</button>
            <div class="nav-icons">
                <i class="fa-regular fa-bell"></i>
                <i class="fa-regular fa-user"></i>
                <i class="fa-solid fa-bars"></i>
            </div>
        </div>
    </nav>

    <div class="main-container">
        
        <div class="dashboard-title">DASHBOARD</div>

        <div class="action-bar">
            <button class="btn-action btn-back">
                <i class="fa-solid fa-rotate-left"></i> Back
            </button>
            
            <div class="info-pill">
                <span>ID: 1</span>
                <span>Name: Strawberry</span>
                <span>Location: Field A1</span>
            </div>

            <button class="btn-action btn-control">
                <i class="fa-solid fa-wifi"></i> Control
            </button>
        </div>

        <div class="section-title">Air</div>
        <div id="air-container" class="panel-grid"></div>

        <div class="section-title">Soil</div>
        <div id="soil-container" class="panel-grid"></div>

    </div>

    <script>
        const airData = [
            { id: "nhiet-do", label: "Temperature", value: "--", unit: "°C", icon: "fa-temperature-half", color: "color-temp" },
            { id: "do-am", label: "Humidity", value: "--", unit: "%", icon: "fa-droplet", color: "color-humid" },
            { id: "anh-sang", label: "Ambient light", value: "--", unit: "lx", icon: "fa-sun", color: "color-light" },
        ];

        const soilData = [
            { id: "soil-moisture", label: "Soil moisture", value: "--", unit: "%", icon: "fa-water", color: "color-soil" }
        ];

        function generatePanelHTML(item) {
            return `
                <div class="panel">
                    <div class="icon-box ${item.color}">
                        <i class="fa-solid ${item.icon}"></i>
                    </div>
                    <div class="data-box">
                        <span class="data-label">${item.label}</span>
                        <span class="data-value"><span id="${item.id}">${item.value}</span><span class="data-unit">${item.unit}</span></span>
                    </div>
                </div>
            `;
        }

        document.getElementById("air-container").innerHTML = airData.map(generatePanelHTML).join('');
        document.getElementById("soil-container").innerHTML = soilData.map(generatePanelHTML).join('');
        async function capNhatDuLieu() {
            try {
                const response = await fetch('/api/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ field_id: "field_999" })
                });

                const data = await response.json();
                console.log("Dữ liệu nhận được:", data);

                const tempVal = parseFloat(data.temperature);
                const humidVal = parseFloat(data.humidity);
                const lightVal = parseFloat(data.light);
                const soilVal = parseFloat(data.soil_moisture);

                const nhietDo = document.getElementById('nhiet-do');
                if (nhietDo) nhietDo.innerText = isNaN(tempVal) ? "--" : tempVal;

                const doAm = document.getElementById('do-am');
                if (doAm) doAm.innerText = isNaN(humidVal) ? "--" : humidVal;

                const anhSang = document.getElementById('anh-sang');
                if (anhSang) anhSang.innerText = isNaN(lightVal) ? "--" : lightVal;

                const soilMois = document.getElementById('soil-moisture');
                if (soilMois) soilMois.innerText = isNaN(soilVal) ? "--" : soilVal;

            } catch (err) {
                console.error("Lỗi tải dữ liệu:", err);
            }
        }

        async function layDanhSachField() {
            try {
                const response = await fetch('/api/fields', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();
                console.log("Danh sách field:", data);

                const fieldContainer = document.getElementById('field-list');
                if (fieldContainer) {
                    fieldContainer.innerHTML = ""; // Xóa dòng "Đang tải..."
                    data.forEach(field => {
                        const li = document.createElement('li');
                        li.textContent = field.field_name; 
                        fieldContainer.appendChild(li);
                    });
                }
            } catch (err) {
                console.error("Lỗi khi gọi API get_field:", err);
            }
        }

        // Gọi ngay khi tải trang
        layDanhSachField();
        capNhatDuLieu();

        // Lặp lại mỗi 5 giây
        setInterval(layDanhSachField, 5000);
        setInterval(capNhatDuLieu, 5000);
    </script>

</body>
</html>
