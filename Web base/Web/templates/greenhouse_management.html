<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCare - Greenhouse Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/greenhouse_management.css">
</head>
<body>

    <div class="navbar">
        <div class="navbar-left">
            <img src="/static/img/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">SmartCare</span>
        </div>
        <div class="navbar-right">
            <img src="/static/img/bell.png" alt="Notifications" class="nav-icon">
            <div class="user-profile">
                <img src="/static/img/user.png" alt="User" class="nav-icon">
                <div class="user-info">
                    <span class="user-name" id="userName">ĐANG TẢI...</span>
                    <span class="user-role" id="userRole">administrator</span>
                </div>
            </div>
            <img src="/static/img/logout-icon.png" alt="Logout" id="logoutBtn" class="nav-icon" style="cursor: pointer;" title="Đăng xuất">
        </div>
    </div>

    <div class="main-container">
        <div class="admin-card">
            
            <div class="card-header">
                <div class="toolbar-left">
                    <button id="btn-back" class="btn-back">
                        <i class="fa-solid fa-rotate-left"></i> Back
                    </button>
                </div>

                <h2 class="page-title">Greenhouse Management</h2>
                
                <div class="toolbar-right">
                    <img src="/static/img/add.png" alt="Add" id="btn-add-icon" class="action-icon" title="Add new field">
                    
                    <img src="/static/img/edit.png" alt="Edit" id="btn-edit-icon" class="action-icon hidden" title="Edit selected field">
                    <img src="/static/img/bin.png" alt="Delete" id="btn-delete-icon" class="action-icon hidden" title="Delete selected field(s)">
                    <img src="/static/img/clear.png" alt="Clear" id="btn-clear-icon" class="action-icon hidden" title="Clear selected field(s)">
                </div>
            </div>

            <div class="table-container">
                <table id="fieldTable">
                    <thead>
                        <tr>
                            <th style="width: 50px;"><input type="checkbox" id="selectAll"></th>
                            
                            <th style="width: 20%; text-align: left;">Field ID</th>
                            <th style="width: 40%; text-align: center;">Plant</th>
                            <th style="width: 40%; text-align: right;">Username</th>
                        </tr>
                    </thead>
                    <tbody id="fieldTableBody">
                        </tbody>
                </table>
            </div>

            <div class="pagination" id="paginationContainer">
                </div>

        </div>
    </div>

    <div class="modal-overlay hidden" id="addFieldModal">
        <div class="modal-box field-modal">
            <div class="modal-header">
                <h3 style="font-size: 28px; font-weight: 900; color: #000;">Add Field</h3>
                <i class="fa-solid fa-xmark close-modal" id="closeAddFieldModal" style="font-size: 24px;"></i>
            </div>
            
            <div class="input-group" style="margin-top: 25px; text-align: left;">
                <label style="font-size: 13px; color: #333; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">Field ID</label>
                <input type="text" id="newFieldId" placeholder="Text field data" autocomplete="off">
            </div>
            
            <div class="modal-actions" style="justify-content: flex-end; margin-top: 40px;">
                <button class="btn-submit-green" id="btn-submit-add-field">Submit</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="editFieldModal">
        <div class="modal-box field-modal">
            <div class="modal-header">
                <h3 style="font-size: 28px; font-weight: 900; color: #000;">Edit Field</h3>
                <i class="fa-solid fa-xmark close-modal" id="closeEditFieldModal" style="font-size: 24px;"></i>
            </div>
            
            <div class="input-group" style="margin-top: 25px; text-align: left;">
                <label style="font-size: 13px; color: #333; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">Field ID</label>
                <select id="editFieldId" class="modal-select">
                    <option value="">Choose the field</option>
                    </select>
            </div>

            <div class="input-group" style="margin-top: 15px; text-align: left;">
                <label style="font-size: 13px; color: #333; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">Username</label>
                <select id="editUsername" class="modal-select">
                    <option value="">Choose username</option>
                    </select>
            </div>

            <div class="input-group" style="margin-top: 15px; text-align: left;">
                <label style="font-size: 13px; color: #333; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">Plant</label>
                <input type="text" id="editPlant" list="plantOptions" placeholder="Type the plant name" class="modal-input" autocomplete="off">
                <datalist id="plantOptions">
                    <option value="Strawberry"></option>
                    <option value="Corn"></option>
                    <option value="Rice"></option>
                    <option value="Orange"></option>   
                </datalist>
            </div>
            
            <div class="modal-actions" style="justify-content: flex-end; margin-top: 35px;">
                <button class="btn-submit-green" id="btn-submit-edit-field">Submit</button>
            </div>
        </div>
    </div>

    <script src="/static/js/greenhouse_management.js"></script>
</body>
</html>
