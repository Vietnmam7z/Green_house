<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCare - Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/control.css">
</head>
<body>

    <div class="navbar">
        <div class="navbar-left">
            <img src="/static/img/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">SmartCare</span>
        </div>

        <div class="navbar-right">
            <img src="/static/img/bell.png" alt="Notifications" class="nav-icon">
            
            <div class="user-profile">
                <img src="/static/img/user.png" alt="User" class="nav-icon">
                <div class="user-info">
                    <span class="user-name" id="userName">ĐANG TẢI...</span>
                    <span class="user-role" id="userRole">role</span>
                </div>
            </div>

            <img src="/static/img/settings.png" alt="Settings" id="btn-settings" class="nav-icon" style="cursor: pointer;" title="Quản lý Hệ thống">
            <img src="/static/img/logout-icon.png" alt="Logout" id="logoutBtn" class="nav-icon" style="cursor: pointer;" title="Đăng xuất">
        </div>
    </div>

    <div class="container">
        <h1 class="page-title">CONTROL</h1>

        <div class="action-bar">
            <button id="goToDashboard" class="btn-action btn-back">
                <i class="fa-solid fa-rotate-left"></i> Back
            </button>
            
            <div class="info-pill" style="display: flex; align-items: center; gap: 15px;">
                <button id="btn-prev-field" class="btn-nav"><i class="fa-solid fa-chevron-left"></i></button>
                <span>Name: <strong id="current-field-name">Strawberry (Field A1)</strong></span>
                <button id="btn-next-field" class="btn-nav"><i class="fa-solid fa-chevron-right"></i></button>
            </div>

            <div style="width: 104px; visibility: hidden;"></div> 
        </div>

        <div class="control-layout">
            <div class="control-panel">
                
                <div class="control-card">
                    <div class="control-left">
                        <i class="fa-regular fa-lightbulb" style="color: #fbc02d; font-size: 1.5rem;"></i>
                        <span>Light</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-card">
                    <div class="control-left">
                        <i class="fa-solid fa-dungeon" style="color: #fbc02d; font-size: 1.5rem;"></i>
                        <span>Vent</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-card">
                    <div class="control-left">
                        <i class="fa-solid fa-faucet-drip" style="color: #42a5f5; font-size: 1.5rem;"></i>
                        <span>Irrigation</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-card">
                    <div class="control-left">
                        <i class="fa-solid fa-snowflake" style="color: #42a5f5; font-size: 1.5rem;"></i>
                        <span>Cooling pad</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-card">
                    <div class="control-left">
                        <i class="fa-solid fa-temperature-arrow-up" style="color: #e64a19; font-size: 1.5rem;"></i>
                        <span>Heater</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-card">
                    <div class="control-left">
                        <i class="fa-solid fa-flask" style="color: #0288d1; font-size: 1.5rem;"></i>
                        <span>CO<sub>2</sub> valve</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>

                 <div class="control-card">
                    <div class="control-left">
                        <i class="fa-solid fa-fan" style="color: #42a5f5; font-size: 1.5rem;"></i>
                        <span>Fan</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>

                 <div class="control-card">
                    <div class="control-left">
                        <i class="fa-solid fa-seedling" style="color: #fbc02d; font-size: 1.5rem;"></i>
                        <span>Fertigation</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>

            </div>

            <div class="video-panel">
                <h2 style="text-align: left; margin-bottom: -10px;">Live video</h2>
                <div class="video-container">
                    <img src="../static/img/live-video.png" alt="Camera 1">
                    <div class="video-label">Camera 1</div>
                </div>
                <div class="video-container">
                    <img src="../static/img/live-video.png" alt="Camera 2">
                    <div class="video-label">Camera 2</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/control.js"></script>
</body>
</html>
