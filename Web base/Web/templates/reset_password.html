<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCare - Reset Password</title>
  <link rel="stylesheet" href="../static/css/reset_password.css">
</head>

<body>
  <!-- Logo -->
  <div class="logo">
    <img src="../static/img/logo.png" alt="Logo">
    <span>SmartCare</span>
  </div>

  <!-- Reset Password Form -->
  <div class="forgot-container">
    <h2>Reset Password</h2>
    <p>Please enter your new password below:</p>
    <form id="resetForm">
      <input type="password" id="newPassword" placeholder="New Password" required>
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      <button type="submit" class="forgot-btn">Reset Password</button>
    </form>
    <div class="links">
      <p>Remembered your password? <a href="login.html">Log in</a></p>
      <p>Don’t have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script src="../static/js/reset_password.js"></script>
</body>
</html>
