<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartCare - Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/home.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <!-- Vùng trái -->
    <div class="navbar-left">
      <img src="../static/img/logo.png" alt="Logo" class="logo-img">
      <span class="logo-text">SmartCare</span>
    </div>

    <!-- Vùng phải -->
    <div class="navbar-right">
      <img src="/static/img/bell.png" alt="Notifications" class="nav-icon">
      
      <div class="user-profile-container">
        <div class="user-profile">
          <img src="/static/img/user.png" alt="User" class="nav-icon">
          <div class="user-info">
            <span class="user-name" id="userName">Loading...</span>
            <span class="user-role" id="userRole">role</span>
          </div>
        </div>

        <div class="user-dropdown">
            <div class="dropdown-greeting">
                Xin chào,
                <span class="greet-name" id="dropdown-userName">...</span>
            </div>
            
            <a href="/profile?tab=account" class="dropdown-item" id="menu-account">
                <i class="fa-regular fa-id-badge"></i> Thông tin tài khoản
            </a>
            <a href="/profile?tab=billing" class="dropdown-item" id="menu-billing">
                <i class="fa-solid fa-receipt"></i> Hóa đơn chưa thanh toán
            </a>
            <a href="/profile?tab=history" class="dropdown-item" id="menu-history">
                <i class="fa-solid fa-clock-rotate-left"></i> Lịch sử thanh toán
            </a>
            <a href="/profile?tab=service" class="dropdown-item" id="menu-service">
                <i class="fa-solid fa-cubes"></i> Gói dịch vụ thuê
            </a>
            
            <a href="/manage" class="dropdown-item" id="menu-admin">
                <i class="fa-solid fa-seedling"></i> Quản lý hệ thống
            </a>
            
            <a href="#" id="dropdown-logoutBtn" class="dropdown-item logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Nội dung -->
  <div class="content">
    <h2>Welcome to SmartCare Dashboard</h2>
    <p>Here will display sensor values, device status, and more...</p>
    <div id="field-summary-container" class="field-cards-grid">
        </div>
    <!-- Hộp hiển thị thông báo -->
    <div id="result"></div>
    <div id="dynamic-charts-container" style="margin-top: 30px;">
</div>
  </div>

  <!-- JS xử lý logout -->
  <script src="../static/js/home.js"></script>
</body>
</html>
