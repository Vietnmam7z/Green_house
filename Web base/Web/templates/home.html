<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartCare - Home</title>
  <link rel="stylesheet" href="../static/css/home.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <!-- Vùng trái -->
    <div class="navbar-left">
      <img src="../static/img/logo.png" alt="Logo" class="logo-img">
      <span class="logo-text">SmartCare</span>
    </div>

    <!-- Vùng phải -->
    <div class="navbar-right">
      <img src="../static/img/bell.png" alt="Notifications" class="nav-icon">
      <img src="../static/img/user.png" alt="User" class="nav-icon">
      <img src="../static/img/menu.png" alt="Menu" class="nav-icon">
      <button id="logoutBtn" class="logout-btn">Log out</button>
    </div>
  </div>

  <!-- Nội dung -->
  <div class="content">
    <h2>Welcome to SmartCare Dashboard</h2>
    <p>Here will display sensor values, device status, and more...</p>
    <div id="field-summary-container" class="field-cards-grid">
        </div>
    <p style="margin-top: 1000px;">Scroll test content...</p>
    <!-- Hộp hiển thị thông báo -->
    <div id="result"></div>
    <div id="dynamic-charts-container" style="margin-top: 30px;">
</div>
  </div>

  <!-- JS xử lý logout -->
  <script src="../static/js/home.js"></script>
</body>
</html>
