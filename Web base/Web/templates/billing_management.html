<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCare - Billing Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/admin_management.css">
    <style>
        /* CSS Riêng cho trang Quản lý Hóa đơn */
        .bill-group-date { background: #2c3e50; color: white; padding: 10px 15px; border-radius: 8px 8px 0 0; font-weight: bold; margin-top: 25px; }
        .bill-table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-radius: 0 0 8px 8px; overflow: hidden; }
        .bill-table th, .bill-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .bill-table th { background: #f8f9fa; color: #555; font-size: 0.95rem; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .status-paid { background: #e8f5e9; color: #2e7d32; }
        .status-unpaid { background: #ffebee; color: #c62828; }
        
        /* CSS cho Pop-up tạo nhiều hóa đơn */
        .dynamic-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .dynamic-row input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; outline: none; }
        .btn-remove-row { color: #f44336; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn-remove-row:hover { color: #d32f2f; }

        /* =========================================
           CSS XỬ LÝ ẨN/HIỆN VÀ ANIMATION POP-UP
        ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 1; visibility: visible; transition: all 0.3s ease;
        }
        .modal-overlay.hidden {
            opacity: 0; visibility: hidden; pointer-events: none;
        }
        .modal-box {
            background: white; width: 750px; border-radius: 12px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateY(0); transition: all 0.3s ease;
        }
        .modal-overlay.hidden .modal-box {
            transform: translateY(-20px);
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="navbar-left">
            <img src="/static/img/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text" onclick="window.location.href='/admin_management'" style="cursor: pointer;" title="Quay lại Trang chủ">SmartCare</span>
        </div>

        <div class="navbar-right">
            <div class="user-profile-container">
                <div class="user-profile">
                    <img src="/static/img/user.png" alt="User" class="nav-icon">
                    <div class="user-info">
                        <span class="user-name" id="userName">ĐANG TẢI...</span>
                        <span class="user-role" id="userRole">administrator</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container" style="flex-direction: column; padding: 40px; justify-content: flex-start; align-items: stretch; overflow-y: auto;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0; font-size: 1.8rem; color: #333;"><i class="fa-solid fa-file-invoice-dollar" style="color: #4CAF50;"></i> Billing Management</h2>
            <button id="btn-open-modal" style="padding: 12px 25px; border: none; background: #4CAF50; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(76,175,80,0.2);"><i class="fa-solid fa-plus"></i> Tạo hóa đơn mới</button>
        </div>

        <div id="bill-list-container">
            <p style="text-align: center; color: #999;">Đang tải danh sách hóa đơn...</p>
        </div>

    </div>

    <div class="modal-overlay hidden" id="multiBillingModal">
        <div class="modal-box">
            
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
                <h3 style="margin: 0; font-size: 1.4rem;"><i class="fa-solid fa-money-check-dollar" style="color: #4CAF50;"></i> Phát hành hóa đơn hàng loạt</h3>
                <i class="fa-solid fa-xmark" id="closeBillingModal" style="font-size: 1.5rem; cursor: pointer; color: #999;"></i>
            </div>

            <div style="display: flex; gap: 10px; font-weight: bold; color: #555; margin-bottom: 10px; padding-left: 5px;">
                <div style="flex: 1;">Mã Ruộng (Field ID)</div>
                <div style="flex: 2;">Tên dịch vụ / Tiêu đề</div>
                <div style="flex: 1.5;">Số tiền (VNĐ)</div>
                <div style="width: 25px;"></div>
            </div>

            <div id="dynamic-bill-rows" style="max-height: 300px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px;">
                </div>

            <button id="btn-add-row" style="padding: 8px 15px; border: 1px dashed #4CAF50; background: #e8f5e9; color: #2e7d32; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 25px;">+ Thêm dòng trống</button>

            <div style="display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #eee; padding-top: 20px;">
                <button id="btn-cancel-modal" style="padding: 12px 25px; border: 1px solid #ccc; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; color: #666;">Hủy</button>
                <button id="btn-submit-bills" style="padding: 12px 30px; border: none; background: #4CAF50; color: white; border-radius: 8px; cursor: pointer; font-weight: bold;">Xác nhận phát hành</button>
            </div>
        </div>
    </div>

    <script src="/static/js/billing_management.js"></script>
</body>
</html>
